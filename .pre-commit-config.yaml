repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: uv run ty check scripts
        language: system
        files: ^scripts/.*\.py$
        pass_filenames: false

      - id: quarto-convert
        name: Regenerate .ipynb from .qmd
        entry: bash -c 'for f in "$@"; do quarto convert "$f" && uv run ruff format "${f%.qmd}.ipynb" >/dev/null && git add "${f%.qmd}.ipynb"; done' --
        language: system
        files: ^notebooks/.*\.qmd$
